<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
<!-- DEFINITIONS -->
<defs>
  <style>
    .link { stroke: #cbd5e1; stroke-width: 2; }
    .link-active { stroke: #3b82f6; stroke-width: 3; stroke-dasharray: 4; animation: dash 1s linear infinite; }
    .node-core { fill: #f8fafc; stroke: #0f172a; stroke-width: 3; }
    .node-agg { fill: #e2e8f0; stroke: #0f172a; stroke-width: 3; }
    .node-edge { fill: #cbd5e1; stroke: #0f172a; stroke-width: 3; }
    .node-host { fill: #ffffff; stroke: #0f172a; stroke-width: 3; }
    .host-text { font-family: Inter, sans-serif; font-size: 10px; font-weight: bold; fill: #0f172a; text-anchor: middle; alignment-baseline: middle; }
    .node-shadow { filter: drop-shadow(3px 3px 0px #0f172a); }
    @keyframes dash { to { stroke-dashoffset: -8; } }
  </style>
</defs>
<!-- Core to Agg -->
