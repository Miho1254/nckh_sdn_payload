version: '3.8'

services:
  nckh-sdn:
    build: .
    image: lms-sdn-env
    container_name: nckh-sdn-mininet
    privileged: true
    network_mode: "host"
    volumes:
      - .:/work
      - /work/lms/backend/node_modules
      - /work/lms/frontend/node_modules
      - /work/lms/frontend/dist
    # CPU Mode: Đã loại bỏ khối deploy yêu cầu NVIDIA Driver
    stdin_open: true
    tty: true
