config:
  target: "{{ $processEnvironment.TARGET || 'http://10.0.0.5:4000' }}"
  phases:
    # Sóng thần Thi trực tuyến (Predictable Ramping)
    # Giai đoạn 1: Chuẩn bị (Sinh viên vào sớm)
    - duration: 30
      arrivalRate: 2
      rampTo: 10
      name: "Early arrivals (Ramp 2 -> 10)"

    # Giai đoạn 2: Sắp đến giờ làm bài (Vào đông hơn)
    - duration: 30
      arrivalRate: 10
      rampTo: 50
      name: "Getting closer (Ramp 10 -> 50)"

    # Giai đoạn 3: Băng thông hình thang (Đỉnh điểm)
    - duration: 30
      arrivalRate: 50
      rampTo: 150
      name: "Peak Ramp Up (50 -> 150)"
      
    # Giai đoạn 4: Trụ lại đỉnh (Bắt đầu thi)
    - duration: 30
      arrivalRate: 150
      name: "Peak Sustained (150 req/s)"

    # Giai đoạn 5: Vãn hồi (Thoát web)
    - duration: 30
      arrivalRate: 150
      rampTo: 2
      name: "Ramp Down after peak"

  defaults:
    headers:
      Content-Type: "application/json"

  variables:
    studentNum: [1, 50, 100, 150, 200, 250, 300, 350, 400, 450, 500]

  processor: "../stress-test/functions.js"

scenarios:
  - name: "Browse courses"
    weight: 30
    flow:
      - function: "generateStudent"
      - post: { url: "/api/auth/login", json: { username: "{{ username }}", password: "password123" }, capture: [{ json: "$.token", as: "token" }] }
      - function: "randomThinkTime"
      - think: "{{ thinkTime }}"
      - get: { url: "/api/courses", headers: { Authorization: "Bearer {{ token }}" } }
      - function: "randomThinkTime"
      - think: "{{ thinkTime }}"
      - get: { url: "/api/courses", headers: { Authorization: "Bearer {{ token }}" } }

  - name: "Register for course"
    weight: 60
    flow:
      - function: "generateStudent"
      - post: { url: "/api/auth/login", json: { username: "{{ username }}", password: "password123" }, capture: [{ json: "$.token", as: "token" }] }
      - function: "randomThinkTime"
      - think: "{{ thinkTime }}"
      - get: { url: "/api/courses", headers: { Authorization: "Bearer {{ token }}" } }
      - function: "pickRandomCourse"
      - post: { url: "/api/register", headers: { Authorization: "Bearer {{ token }}" }, json: { course_id: "{{ courseId }}" } }
      - think: 2
      - get: { url: "/api/register/my", headers: { Authorization: "Bearer {{ token }}" } }

  - name: "Register and cancel"
    weight: 10
    flow:
      - function: "generateStudent"
      - post: { url: "/api/auth/login", json: { username: "{{ username }}", password: "password123" }, capture: [{ json: "$.token", as: "token" }] }
      - function: "pickRandomCourse"
      - post: { url: "/api/register", headers: { Authorization: "Bearer {{ token }}" }, json: { course_id: "{{ courseId }}" }, capture: [{ json: "$.registration_id", as: "regId" }] }
      - think: 3
      - delete: { url: "/api/register/{{ regId }}", headers: { Authorization: "Bearer {{ token }}" } }
